services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - monitoring

networks:
  monitoring:
    external: true
